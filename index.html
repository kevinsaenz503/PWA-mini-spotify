<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
          content="#1DB954">

    <title>Mini Spotify</title>

    <link rel="manifest"
          href="./manifest.webmanifest">

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body>

    <!-- Contenido -->

    <main class="content">

        <!-- Inicio -->

        <section id="homeSection">

            <h1>Todas las canciones</h1>

            <div id="songs"
                 class="songs-grid">

            </div>

        </section>

        <!-- Buscar -->

        <section id="searchSection"
                 style="display:none;">

            <h1>Buscar</h1>

            <input type="text"
                   id="search"
                   placeholder="Buscar canción o artista">

            <div id="searchResults"
                 class="songs-grid">

            </div>

        </section>

        <!-- Favoritos -->

        <section id="favoritesSection"
                 style="display:none;">

            <h1>Favoritos ❤️</h1>

            <div id="favorites"
                 class="songs-grid">

            </div>

        </section>

        <!-- Instalar -->

        <section id="installSection"
                 style="display:none;">

            <h1>Instalar aplicación</h1>

            <p>

                Instala Mini Spotify en tu dispositivo.

            </p>

            <button id="installBtn"
                    hidden>

                📲 Instalar

            </button>

        </section>

    </main>

    <!-- Reproductor -->

    <footer class="player-bar">

        <div class="current-cover">

            <img id="currentCover"
                 src=""
                 alt="Portada">

        </div>

        <div class="current-info">

            <span id="currentSong">

                Ninguna canción seleccionada

            </span>

        </div>

        <div class="controls">

            <button id="prevBtn">

                ⏮

            </button>

            <button id="playBtn">

                ▶

            </button>

            <button id="nextBtn">

                ⏭

            </button>

            <button id="favBtn">

                🤍

            </button>

        </div>

        <div class="progress-container">

    <span id="currentTime">
        0:00
    </span>

    <input
        type="range"
        id="progressBar"
        value="0"
        min="0">

    <span id="duration">
        0:00
    </span>

    <button id="volumeBtn">
        🔊
    </button>

</div>

        <audio id="player">

        </audio>

    </footer>

    <script src="./js/app.js"></script>
    <script src="./js/songs.js"></script>
    
    <nav class="bottom-nav">

    <button
        class="nav-btn active"
        onclick="showSection('homeSection', this)">

        🏠
        <span>Inicio</span>

    </button>

    <button
        class="nav-btn"
        onclick="showSection('searchSection', this)">

        🔍
        <span>Buscar</span>

    </button>

    <button
        class="nav-btn"
        onclick="showSection('favoritesSection', this)">

        ❤️
        <span>Favoritos</span>

    </button>

    <button
        class="nav-btn"
        onclick="showSection('installSection', this)">

        📲
        <span>Instalar</span>

    </button>

</nav>

</body>

</html>
